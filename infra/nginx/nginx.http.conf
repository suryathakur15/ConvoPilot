# ── Phase 1: HTTP only (before SSL cert is issued) ───────────────────────────
# Used by Certbot's HTTP-01 ACME challenge.
# After certs are issued, swap to nginx.ssl.conf.

server {
    listen 80;
    server_name _;  # replaced with your domain by the setup script

    # Let's Encrypt ACME challenge passthrough
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other traffic → 301 redirect to HTTPS once cert is live.
    # For the first run this block won't be hit.
    location / {
        return 301 https://$host$request_uri;
    }
}
