# ── Phase 2: Full HTTPS config (after cert is issued) ────────────────────────
# Replace DOMAIN_PLACEHOLDER with your actual domain before deploying.

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name DOMAIN_PLACEHOLDER;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS reverse proxy
server {
    listen 443 ssl;
    server_name DOMAIN_PLACEHOLDER;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS (6 months)
    add_header Strict-Transport-Security "max-age=15768000" always;

    # ── API + Socket.io ──────────────────────────────────────────────────────
    location / {
        proxy_pass         http://backend:4000;
        proxy_http_version 1.1;

        # WebSocket / Socket.io upgrade headers
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    900s;   # long timeout for SSE / socket keep-alives
        proxy_send_timeout    900s;
        proxy_connect_timeout 10s;

        # Disable buffering for streaming responses (SSE, socket)
        proxy_buffering       off;
        proxy_cache           off;
    }

    # ── AI service endpoints proxy'd separately ──────────────────────────────
    location /ai/ {
        proxy_pass         http://ai-service:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_read_timeout 120s;
    }
}
