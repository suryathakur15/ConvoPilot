version: "3.9"

# ─── Production compose ───────────────────────────────────────────────────────
# Differences from the dev compose:
#   - No source volume mounts (images are built from Dockerfiles)
#   - Backend and AI service run in production mode
#   - Redis and Postgres ports NOT exposed to host (internal only)
#   - Frontend served via S3 + CloudFront — not included here
#   - All containers restart unless manually stopped

services:

  postgres:
    image: postgres:15-alpine
    container_name: convopilot_postgres
    restart: unless-stopped
    env_file: ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-convopilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-convopilot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-convopilot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: convopilot_redis
    restart: unless-stopped
    env_file: ../.env
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: convopilot-backend:prod
    container_name: convopilot_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ../.env
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      AI_SERVICE_URL: http://ai-service:8000
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:4000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    # No source volume — uses the image built by Dockerfile

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    image: convopilot-ai:prod
    container_name: convopilot_ai
    restart: unless-stopped
    env_file: ../.env
    environment:
      AI_SERVICE_HOST: "0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/ai/config')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:1.25-alpine
    container_name: convopilot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Active config — starts as HTTP-only; setup-ssl.sh replaces with SSL config
      - ../infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt certs (populated by Certbot on the host)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Certbot webroot for ACME HTTP-01 challenge
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  certbot_www:
